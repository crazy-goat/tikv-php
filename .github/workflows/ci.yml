name: CI

on:
  pull_request:
    branches: ["master"]

jobs:
  check-actor:
    name: Check actor permissions
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check if actor is owner or collaborator
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const owner = context.repo.owner;

            if (actor === owner) {
              core.setOutput('allowed', 'true');
              return;
            }

            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              const level = data.permission;
              const allowed = ['admin', 'maintain', 'write'].includes(level);
              core.setOutput('allowed', allowed ? 'true' : 'false');
              if (!allowed) {
                core.warning(`Actor "${actor}" has permission "${level}" — skipping CI.`);
              }
            } catch (e) {
              core.setOutput('allowed', 'false');
              core.warning(`Could not determine permissions for "${actor}": ${e.message}`);
            }

  changes:
    name: Detect changed paths
    needs: check-actor
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'tests/E2E/**'
              - 'docker-compose.yml'
              - 'Dockerfile'
              - 'composer.json'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint (PHPCS + Rector + PHPStan)
    needs: check-actor
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: grpc
          coverage: none
        env:
          COMPOSER_PROCESS_TIMEOUT: 0

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer cs

      - name: Run Rector (dry-run)
        run: composer rector

      - name: Run PHPStan
        run: composer phpstan

  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    needs: [check-actor, lint]
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Note: grpc extension not needed for unit tests (we mock gRPC calls)
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        run: ./vendor/bin/phpunit --testsuite Unit --testdox --no-coverage
        timeout-minutes: 5

  e2e-tests:
    name: E2E Tests
    needs: [check-actor, lint, changes]
    if: needs.check-actor.outputs.allowed == 'true' && needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start TiKV cluster
        run: docker compose up -d pd tikv1 tikv2 tikv3

      - name: Wait for TiKV cluster
        run: |
          echo "Waiting for TiKV cluster to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps --status running 2>/dev/null | grep -q "healthy"; then
              echo "TiKV cluster is ready!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timeout waiting for TiKV cluster"
              docker compose ps
              exit 1
            fi
            sleep 2
          done

      - name: Install dependencies
        run: docker compose run --rm php-client composer install --no-interaction --prefer-dist --no-progress

      - name: Run E2E tests
        run: |
          docker compose run --rm \
            -e PD_ENDPOINTS=pd:2379 \
            php-client vendor/bin/phpunit --testsuite E2E --testdox
        timeout-minutes: 10

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans
